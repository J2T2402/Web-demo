# Gộp FE + BE (app) + PostgreSQL (db) trên 1 VPS. Xem plan Mục 10.
# Lần đầu chạy: tạo file .env (tham khảo .env.example) rồi `docker compose up -d --build`.

services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # DATABASE_URL trỏ tới service `db` trong cùng compose network.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    # Đồng bộ schema vào DB rồi khởi động (server tự seed 50 địa danh + admin).
    command: sh -c "npx prisma db push --skip-generate && node dist/index.js"
    # Chỉ mở ra localhost (an toàn: tránh Docker tự mở cổng ra internet vượt UFW).
    # Production có Caddy đứng trước (xem docker-compose.prod.yml) gọi app qua mạng nội bộ.
    ports:
      - "127.0.0.1:3000:3000"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # HTTPS (Caddy) được thêm qua docker-compose.prod.yml — xem DEPLOY.md Bước 4.

volumes:
  pgdata:
